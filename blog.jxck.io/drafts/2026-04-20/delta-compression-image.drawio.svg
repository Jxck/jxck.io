<svg host="65bd71144e" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="740px" height="320px" viewBox="-0.5 -0.5 740 320" content="&lt;mxfile&gt;&lt;diagram id=&quot;delta-comp-1&quot; name=&quot;Page-1&quot;&gt;&lt;/diagram&gt;&lt;/mxfile&gt;">
    <defs/>
    <g>
        <!-- v1.0.0.js label -->
        <text x="10" y="25" font-family="monospace" font-size="13" font-weight="bold" fill="#000">v1.0.0.js (= dictionary)</text>

        <!-- v1.0.0.js bar -->
        <rect x="10" y="40" width="720" height="40" rx="4" fill="#E0E0E0" stroke="#666" stroke-width="1"/>
        <text x="370" y="65" font-family="monospace" font-size="11" text-anchor="middle" fill="#333">0 ................................ 99 | 100 ~ 110 | 111 ................................ end</text>

        <!-- v1.0.1.js label -->
        <text x="10" y="120" font-family="monospace" font-size="13" font-weight="bold" fill="#000">v1.0.1.js</text>

        <!-- v1.0.1.js same part 1 -->
        <rect x="10" y="130" width="290" height="40" rx="4" fill="#E0E0E0" stroke="#666" stroke-width="1"/>
        <text x="155" y="155" font-family="monospace" font-size="11" text-anchor="middle" fill="#333">same</text>

        <!-- v1.0.1.js changed part -->
        <rect x="300" y="130" width="100" height="40" fill="#FF6B6B" stroke="#CC5555" stroke-width="1"/>
        <text x="350" y="155" font-family="monospace" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">changed</text>

        <!-- v1.0.1.js same part 2 -->
        <rect x="400" y="130" width="330" height="40" rx="4" fill="#E0E0E0" stroke="#666" stroke-width="1"/>
        <text x="565" y="155" font-family="monospace" font-size="11" text-anchor="middle" fill="#333">same</text>

        <!-- arrow label -->
        <text x="370" y="195" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">v1.0.0 を辞書として v1.0.1 を圧縮すると...</text>

        <!-- arrow -->
        <line x1="370" y1="205" x2="370" y2="228" stroke="#555" stroke-width="1.5"/>
        <polygon points="365,225 370,233 375,225" fill="#555"/>

        <!-- compressed label -->
        <text x="10" y="255" font-family="monospace" font-size="13" font-weight="bold" fill="#000">compressed (v1.0.1.dcb)</text>

        <!-- compressed: dict ref 1 -->
        <rect x="10" y="265" width="200" height="40" rx="4" fill="#A0D8EF" stroke="#7BAFCF" stroke-width="1"/>
        <text x="110" y="290" font-family="monospace" font-size="11" text-anchor="middle" fill="#333">ref dict[0:99]</text>

        <!-- compressed: new data -->
        <rect x="210" y="265" width="80" height="40" fill="#FF6B6B" stroke="#CC5555" stroke-width="1"/>
        <text x="250" y="290" font-family="monospace" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">new</text>

        <!-- compressed: dict ref 2 -->
        <rect x="290" y="265" width="180" height="40" rx="4" fill="#A0D8EF" stroke="#7BAFCF" stroke-width="1"/>
        <text x="380" y="290" font-family="monospace" font-size="11" text-anchor="middle" fill="#333">ref dict[111:end]</text>

        <!-- size note -->
        <text x="490" y="290" font-family="monospace" font-size="11" fill="#555">— 実質 diff 相当のサイズに</text>
    </g>
    <switch>
        <g requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"/>
